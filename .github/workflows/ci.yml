name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck all scripts
        run: |
          find scripts/ -name '*.sh' -exec shellcheck -x {} +

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  validate-helm:
    name: Validate Helm Values
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Sentry chart repo
        run: |
          helm repo add sentry https://sentry-kubernetes.github.io/charts
          helm repo update

      - name: Helm template validation
        run: |
          helm template sentry sentry/sentry \
            -f k8s/sentry-values.yaml \
            --set system.url=https://test.example.com \
            --set user.email=test@example.com \
            --set user.password=testpassword123 \
            --set ingress.hostname=test.example.com \
            > /dev/null

  validate-k8s-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate ClickHouse manifest
        run: kubectl apply --dry-run=client -f k8s/clickhouse.yaml 2>&1 || true

      - name: Validate monitoring manifests
        run: |
          kubectl apply --dry-run=client -f k8s/monitoring/prometheus.yaml 2>&1 || true
          kubectl apply --dry-run=client -f k8s/monitoring/grafana.yaml 2>&1 || true
          kubectl apply --dry-run=client -f k8s/monitoring/node-exporter.yaml 2>&1 || true

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            k8s/sentry-values.yaml \
            k8s/clickhouse.yaml \
            k8s/monitoring/*.yaml \
            terraform/cloud-init.yml \
            || true  # Don't fail on style warnings
