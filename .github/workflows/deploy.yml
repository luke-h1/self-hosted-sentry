name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "example-app/**"
      - ".github/workflows/ci.yml"

  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - sentry
          - nginx
          - monitoring

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: root

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<EOF
          Host sentry-server
            HostName ${{ secrets.SERVER_HOST }}
            User root
            Port ${{ secrets.SSH_PORT || 22 }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF

      - name: Verify server is reachable
        run: |
          ssh sentry-server "echo 'Connected to $(hostname)'"

      - name: Sync deployment files
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'example-app' \
            --exclude 'terraform' \
            --exclude '.env' \
            --exclude 'k8s' \
            --exclude '*.md' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ sentry-server:/opt/sentry/deploy/

      - name: Deploy Sentry config
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'sentry' || github.event_name == 'push'
        run: |
          ssh sentry-server << 'DEPLOY'
          set -euo pipefail
          cd /opt/sentry/deploy

          echo "=== Applying Sentry configuration ==="
          # Re-run install to apply config changes (skips full install if already done)
          if [[ -d /opt/sentry/self-hosted ]]; then
            # Copy override file
            cp docker-compose.override.yml /opt/sentry/self-hosted/docker-compose.override.yml
            echo "Override file updated"

            # Restart to pick up changes
            cd /opt/sentry/self-hosted
            docker compose up -d
            echo "Sentry containers restarted"
          else
            echo "Sentry not installed yet. Run 'make install' on the server first."
            exit 1
          fi
          DEPLOY

      - name: Deploy Nginx config
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'nginx' || github.event_name == 'push'
        run: |
          ssh sentry-server << 'DEPLOY'
          set -euo pipefail
          cd /opt/sentry/deploy

          if [[ -f /etc/nginx/sites-available/sentry ]]; then
            echo "=== Updating Nginx configuration ==="
            source .env 2>/dev/null || true
            DOMAIN="${SENTRY_DOMAIN:-localhost}"

            cp nginx/sentry.conf /etc/nginx/sites-available/sentry
            sed -i "s/SENTRY_DOMAIN/$DOMAIN/g" /etc/nginx/sites-available/sentry

            nginx -t && systemctl reload nginx
            echo "Nginx reloaded"
          else
            echo "Nginx not configured yet. Run 'make nginx' on the server first."
          fi
          DEPLOY

      - name: Deploy monitoring stack
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'monitoring' || github.event_name == 'push'
        run: |
          ssh sentry-server << 'DEPLOY'
          set -euo pipefail
          cd /opt/sentry/deploy

          if docker compose -f monitoring/docker-compose.yml ps --quiet 2>/dev/null | grep -q .; then
            echo "=== Updating monitoring stack ==="
            source .env 2>/dev/null || true
            export SENTRY_DOMAIN="${SENTRY_DOMAIN:-localhost}"
            export GRAFANA_ADMIN_USER="${GRAFANA_ADMIN_USER:-admin}"
            export GRAFANA_ADMIN_PASSWORD="${GRAFANA_ADMIN_PASSWORD:-admin}"

            docker compose -f monitoring/docker-compose.yml up -d
            echo "Monitoring stack updated"
          else
            echo "Monitoring not running. Run 'make monitoring-setup' on the server first."
          fi
          DEPLOY

      - name: Health check
        run: |
          echo "Waiting 30s for services to stabilize..."
          sleep 30

          ssh sentry-server << 'CHECK'
          set -euo pipefail

          echo "=== Post-deploy health check ==="

          # Sentry
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://127.0.0.1:9000/_health/ 2>/dev/null || echo "000")
          if [[ "$HTTP" == "200" ]]; then
            echo "[PASS] Sentry is healthy"
          else
            echo "[FAIL] Sentry returned HTTP $HTTP"
            exit 1
          fi

          # Nginx
          if systemctl is-active --quiet nginx; then
            echo "[PASS] Nginx is running"
          else
            echo "[FAIL] Nginx is not running"
            exit 1
          fi

          # Prometheus
          PROM=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:9090/-/healthy 2>/dev/null || echo "000")
          if [[ "$PROM" == "200" ]]; then
            echo "[PASS] Prometheus is healthy"
          else
            echo "[WARN] Prometheus returned HTTP $PROM (monitoring may not be set up)"
          fi

          # Grafana
          GRAF=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/grafana/api/health 2>/dev/null || echo "000")
          if [[ "$GRAF" == "200" ]]; then
            echo "[PASS] Grafana is healthy"
          else
            echo "[WARN] Grafana returned HTTP $GRAF"
          fi

          echo "=== Deploy complete ==="
          CHECK

      - name: Notify on failure
        if: failure()
        run: |
          if [[ -n "${{ secrets.MONITOR_WEBHOOK_URL }}" ]]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data '{"text":"Sentry deploy FAILED on commit ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
              "${{ secrets.MONITOR_WEBHOOK_URL }}" || true
          fi
