name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "example-app/**"
      - ".github/workflows/ci.yml"

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: root

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<EOF
          Host sentry-server
            HostName ${{ secrets.SERVER_HOST }}
            User root
            Port ${{ secrets.SSH_PORT || 22 }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF

      - name: Verify server is reachable
        run: |
          ssh sentry-server "echo 'Connected to $(hostname)'"

      - name: Sync deployment files
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'example-app' \
            --exclude 'terraform' \
            --exclude '.env' \
            --exclude '*.md' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ sentry-server:/opt/sentry/deploy/

      - name: Deploy Sentry via Helm
        run: |
          ssh sentry-server << 'DEPLOY'
          set -euo pipefail
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          cd /opt/sentry/deploy

          echo "=== Upgrading Sentry via Helm ==="
          if helm -n sentry status sentry &>/dev/null; then
            # Apply updated ClickHouse manifest
            kubectl apply -f k8s/clickhouse.yaml

            # Helm upgrade with existing values + new values file
            helm upgrade sentry sentry/sentry -n sentry \
              -f k8s/sentry-values.yaml \
              --reuse-values \
              --timeout 15m --wait

            if kubectl get namespace monitoring >/dev/null 2>&1; then
              echo "=== Removing legacy monitoring namespace ==="
              kubectl delete namespace monitoring --ignore-not-found --wait=false
            fi

            echo "Sentry upgraded"
          else
            echo "Sentry not installed yet. Run 'make install' on the server first."
            exit 1
          fi
          DEPLOY

      - name: Health check
        run: |
          echo "Waiting 30s for services to stabilize..."
          sleep 30

          ssh sentry-server << 'CHECK'
          set -euo pipefail
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "=== Post-deploy health check ==="

          # Sentry
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 http://127.0.0.1/_health/ 2>/dev/null || echo "000")
          if [[ "$HTTP" == "200" ]]; then
            echo "[PASS] Sentry is healthy"
          else
            echo "[FAIL] Sentry returned HTTP $HTTP"
            exit 1
          fi

          # K3s
          NODE_STATUS=$(kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
          if [[ "$NODE_STATUS" == "True" ]]; then
            echo "[PASS] K3s node Ready"
          else
            echo "[FAIL] K3s node not Ready"
            exit 1
          fi

          # Pods
          NOT_RUNNING=$(kubectl -n sentry get pods --no-headers 2>/dev/null | grep -cvE "Running|Completed" || echo "0")
          if [[ "$NOT_RUNNING" -gt 0 ]]; then
            echo "[WARN] $NOT_RUNNING pod(s) not running"
          else
            echo "[PASS] All sentry pods running"
          fi

          echo "=== Deploy complete ==="
          CHECK

      - name: Notify on failure
        if: failure()
        run: |
          if [[ -n "${{ secrets.MONITOR_WEBHOOK_URL }}" ]]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data '{"text":"Sentry deploy FAILED on commit ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
              "${{ secrets.MONITOR_WEBHOOK_URL }}" || true
          fi
