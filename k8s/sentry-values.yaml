# Helm values for sentry-kubernetes/charts
# Tuned for Hetzner CX53 (16 vCPU, 32GB RAM, 240GB disk)
# All replicas: 1, non-essential features disabled

system:
  url: ""  # Set via --set system.url=https://sentry.example.com

user:
  create: true
  email: ""      # Set via --set user.email=...
  password: ""   # Set via --set user.password=...

sentry:
  web:
    replicas: 1
    resources:
      limits:
        memory: 3Gi
      requests:
        memory: 512Mi
        cpu: 100m
    livenessProbe:
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10
    readinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 10
    env:
      - name: SECURE_PROXY_SSL_HEADER
        value: "HTTP_X_FORWARDED_PROTO,https"
      - name: USE_X_FORWARDED_HOST
        value: "true"
      - name: SESSION_COOKIE_SECURE
        value: "true"
      - name: CSRF_COOKIE_SECURE
        value: "true"

  worker:
    replicas: 1
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 256Mi
        cpu: 100m

  cron:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestMetricsConsumerPerf:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestMetricsConsumerRh:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestReplayRecordings:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestMonitors:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  billingMetricsConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  subscriptionConsumerEvents:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  subscriptionConsumerTransactions:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  subscriptionConsumerMetrics:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  postProcessForwardErrors:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  postProcessForwardTransactions:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  postProcessForwardIssuePlatform:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

  profiling:
    enabled: false
  spans:
    enabled: false
  uptime:
    enabled: false
  feedback:
    enabled: false

  cleanup:
    days: 30
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

relay:
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 128Mi
      cpu: 50m

snuba:
  api:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m
  consumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m
  outcomesConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m
  sessionsConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m
  transactionsConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m
  replacer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 128Mi
        cpu: 50m

symbolicator:
  enabled: false

# Bundled nginx disabled - using K3s Traefik ingress
nginx:
  enabled: false

ingress:
  enabled: true
  ingressClassName: traefik
  hostname: ""  # Set via system.url
  regexPathStyle: traefik

# External ClickHouse (deployed separately via k8s/clickhouse.yaml)
externalClickhouse:
  host: clickhouse.sentry.svc.cluster.local
  tcpPort: 9000
  httpPort: 8123
  database: default
  clusterName: ""
  singleNode: true

clickhouse:
  enabled: false

# Bundled PostgreSQL
postgresql:
  enabled: true
  primary:
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 256Mi
        cpu: 100m
    persistence:
      size: 10Gi
    extendedConfiguration: |
      shared_buffers = 512MB
      effective_cache_size = 1GB
      maintenance_work_mem = 128MB
      work_mem = 8MB
      max_connections = 100
      wal_buffers = 16MB
      checkpoint_completion_target = 0.9
      random_page_cost = 1.1
      effective_io_concurrency = 200
      min_wal_size = 64MB
      max_wal_size = 512MB
      log_min_duration_statement = 2000

externalPostgresql:
  enabled: false

# Bundled Redis
redis:
  enabled: true
  master:
    resources:
      limits:
        memory: 256Mi
      requests:
        memory: 64Mi
        cpu: 50m
    persistence:
      size: 2Gi
  replica:
    replicaCount: 0

externalRedis:
  enabled: false

# Bundled Kafka (KRaft mode, single controller)
kafka:
  enabled: true
  controller:
    replicaCount: 1
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 256Mi
        cpu: 100m
    persistence:
      size: 10Gi
    heapOpts: "-Xmx512m -Xms256m"
  kraft:
    enabled: true
  provisioning:
    replicationFactor: 1
  extraConfig: |
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    default.replication.factor=1

externalKafka:
  enabled: false

# Zookeeper disabled (using KRaft)
zookeeper:
  enabled: false

# Memcached
memcached:
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 64Mi
      cpu: 50m

mail:
  backend: smtp
  useTls: true
  useSsl: false

filestore:
  backend: filesystem
  filesystem:
    persistence:
      size: 5Gi

github:
  appId: ""       # Set via --set github.appId=...
  appName: ""     # Set via --set github.appName=...
  secret: ""      # Set via --set github.secret=...
  webhookSecret: "" # Set via --set github.webhookSecret=...
  privateKey: ""  # Set via --set github.privateKey=...
  clientId: ""    # Set via --set github.clientId=...
  clientSecret: "" # Set via --set github.clientSecret=...

config:
  sentryConfPy: |
    import os
    SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
    USE_X_FORWARDED_HOST = True
    SESSION_COOKIE_SECURE = True
    SESSION_COOKIE_HTTPONLY = True
    SESSION_COOKIE_SAMESITE = "Lax"
    CSRF_COOKIE_SECURE = True
    CSRF_COOKIE_HTTPONLY = False
    CSRF_TRUSTED_ORIGINS = [os.getenv("SENTRY_CSRF_TRUSTED_ORIGIN", "https://sentry.example.com")]
    SOCIAL_AUTH_REDIRECT_IS_HTTPS = True
    SENTRY_RATELIMITER_OPTIONS = {}
    # --- Immutable options fix ---
    # The Helm chart's sentry.conf.py sets mail/auth options in SENTRY_OPTIONS,
    # making them immutable in the admin UI. Remove them so Sentry reads from
    # the database instead. Values are seeded by install-sentry.sh step [4/5].
    for _k in list(SENTRY_OPTIONS.keys()):
        if _k.startswith('mail.') or _k == 'auth.allow-registration':
            del SENTRY_OPTIONS[_k]
  configYml:
    auth.ip-rate-limit: 10
    auth.user-rate-limit: 5
