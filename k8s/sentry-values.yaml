system:
  url: ""  # Set via --set system.url=https://sentry.example.com

user:
  create: true
  email: ""      # Set via --set user.email=...
  password: ""   # Set via --set user.password=...

sentry:
  web:
    replicas: 1
    resources:
      limits:
        memory: 1536Mi
      requests:
        memory: 768Mi
        cpu: 250m
    livenessProbe:
      initialDelaySeconds: 180
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 15
    readinessProbe:
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 15
    env:
      - name: SECURE_PROXY_SSL_HEADER
        value: "HTTP_X_FORWARDED_PROTO,https"
      - name: USE_X_FORWARDED_HOST
        value: "true"
      - name: SESSION_COOKIE_SECURE
        value: "true"
      - name: CSRF_COOKIE_SECURE
        value: "true"

  worker:
    replicas: 1
    resources:
      limits:
        memory: 1024Mi
      requests:
        memory: 512Mi
        cpu: 250m

  cron:
    replicas: 1
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 128Mi
        cpu: 50m

  ingestConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 192Mi
        cpu: 100m

  ingestMetricsConsumerPerf:
    replicas: 0

  ingestMetricsConsumerRh:
    replicas: 0

  ingestReplayRecordings:
    replicas: 0

  ingestMonitors:
    replicas: 0

  billingMetricsConsumer:
    replicas: 0

  subscriptionConsumerEvents:
    replicas: 1
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 128Mi
        cpu: 50m

  subscriptionConsumerTransactions:
    replicas: 0

  subscriptionConsumerMetrics:
    replicas: 0

  postProcessForwardErrors:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 192Mi
        cpu: 100m

  postProcessForwardTransactions:
    replicas: 0

  postProcessForwardIssuePlatform:
    replicas: 0

  profiling:
    enabled: false
  spans:
    enabled: false
  uptime:
    enabled: false
  feedback:
    enabled: false
  taskbroker:
    enabled: false

  cleanup:
    days: 14
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 128Mi
        cpu: 50m

relay:
  replicas: 1
  resources:
    limits:
      memory: 768Mi
    requests:
      memory: 256Mi
      cpu: 100m

snuba:
  api:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
  consumer:
    replicas: 1
    resources:
      limits:
        memory: 768Mi
      requests:
        memory: 384Mi
        cpu: 150m
  outcomesConsumer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
  sessionsConsumer:
    replicas: 0
  transactionsConsumer:
    replicas: 0
  replacer:
    replicas: 1
    resources:
      limits:
        memory: 384Mi
      requests:
        memory: 128Mi
        cpu: 50m

symbolicator:
  enabled: false

nginx:
  enabled: false

ingress:
  enabled: true
  ingressClassName: traefik
  hostname: ""  # Set via system.url
  regexPathStyle: traefik

externalClickhouse:
  host: clickhouse.sentry.svc.cluster.local
  tcpPort: 9000
  httpPort: 8123
  database: default
  clusterName: ""
  singleNode: true

clickhouse:
  enabled: false

postgresql:
  enabled: true
  primary:
    resources:
      limits:
        memory: 1024Mi
      requests:
        memory: 512Mi
        cpu: 250m
    persistence:
      size: 8Gi
    extendedConfiguration: |
      shared_buffers = 512MB
      effective_cache_size = 2GB
      maintenance_work_mem = 128MB
      work_mem = 8MB
      max_connections = 100
      wal_buffers = 16MB
      checkpoint_completion_target = 0.9
      random_page_cost = 1.1
      effective_io_concurrency = 200
      min_wal_size = 128MB
      max_wal_size = 512MB
      log_min_duration_statement = 2000

externalPostgresql:
  enabled: false

redis:
  enabled: true
  master:
    resources:
      limits:
        memory: 768Mi
      requests:
        memory: 256Mi
        cpu: 100m
    persistence:
      size: 1Gi
  replica:
    replicaCount: 0

externalRedis:
  enabled: false

kafka:
  enabled: true
  controller:
    replicaCount: 1
    resources:
      limits:
        memory: 1024Mi
      requests:
        memory: 512Mi
        cpu: 250m
    persistence:
      size: 5Gi
    heapOpts: "-Xmx512m -Xms256m"
  kraft:
    enabled: true
  provisioning:
    replicationFactor: 1
    topics:
      - name: taskworker
      - name: taskworker-ingest
      - name: taskworker-long
      - name: taskworker-products
  extraConfig: |
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    default.replication.factor=1

externalKafka:
  enabled: false

zookeeper:
  enabled: false

memcached:
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 64Mi
      cpu: 25m

mail:
  backend: smtp
  useTls: true
  useSsl: false

filestore:
  backend: filesystem
  s3:
    bucketName: ""  # Set via --set filestore.s3.bucketName=$SENTRY_S3_BUCKET
    region: ""      # Set via --set filestore.s3.region=$SENTRY_S3_REGION
    endpointUrl: "" # Set via --set filestore.s3.endpointUrl=$SENTRY_S3_ENDPOINT
    accessKey: ""   # Set via --set filestore.s3.accessKey=$SENTRY_S3_ACCESS_KEY_ID
    secretKey: ""   # Set via --set filestore.s3.secretKey=$SENTRY_S3_SECRET_ACCESS_KEY
    signatureVersion: s3v4
    defaultAcl: private
  filesystem:
    persistence:
      enabled: true
      size: 10Gi

github:
  appId: ""       # Set via --set github.appId=...
  appName: ""     # Set via --set github.appName=...
  secret: ""      # Set via --set github.secret=...
  webhookSecret: "" # Set via --set github.webhookSecret=...
  privateKey: ""  # Set via --set github.privateKey=...
  clientId: ""    # Set via --set github.clientId=...
  clientSecret: "" # Set via --set github.clientSecret=...

config:
  sentryConfPy: |
    import os
    SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
    USE_X_FORWARDED_HOST = True
    SESSION_COOKIE_SECURE = True
    SESSION_COOKIE_HTTPONLY = True
    SESSION_COOKIE_SAMESITE = "Lax"
    CSRF_COOKIE_SECURE = True
    CSRF_COOKIE_HTTPONLY = False
    CSRF_COOKIE_SAMESITE = "None"  # Required for Cloudflare proxy
    # Keep CSRF_TRUSTED_ORIGINS aligned with the URL Helm sets for the install.
    _system_url = SENTRY_OPTIONS.get("system.url-prefix", os.getenv("SENTRY_CSRF_TRUSTED_ORIGIN", ""))
    CSRF_TRUSTED_ORIGINS = [_system_url] if _system_url else []
    SOCIAL_AUTH_REDIRECT_IS_HTTPS = True
    SENTRY_RATELIMITER_OPTIONS = {}
    # Drop chart-injected mail/auth options so the admin UI uses DB-backed values.
    for _k in list(SENTRY_OPTIONS.keys()):
        if _k.startswith('mail.') or _k == 'auth.allow-registration':
            del SENTRY_OPTIONS[_k]
  configYml:
    auth.ip-rate-limit: 10
    auth.user-rate-limit: 5
