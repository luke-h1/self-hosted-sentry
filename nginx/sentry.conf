# Nginx reverse proxy for self-hosted Sentry.
# SSL via Cloudflare Origin Certificate. Cloudflare SSL mode: "Full (Strict)".

server_tokens off;

limit_req_zone $binary_remote_addr zone=sentry_api:20m rate=50r/s;
limit_req_zone $binary_remote_addr zone=sentry_store:20m rate=100r/s;
limit_req_zone $binary_remote_addr zone=sentry_auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=sentry_conn:10m;

upstream sentry {
    server 127.0.0.1:9000;
    keepalive 64;
}

# Cloudflare IP ranges: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

log_format sentry_json escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"cf_connecting_ip":"$http_cf_connecting_ip",'
    '"cf_ray":"$http_cf_ray",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_user_agent":"$http_user_agent",'
    '"http_referer":"$http_referer"'
  '}';

# Drop non-Cloudflare connections
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-key.pem;
    server_name _;
    return 444;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name SENTRY_DOMAIN;

    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SENTRY_DOMAIN;

    ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-key.pem;

    # Authenticated Origin Pulls - uncomment after placing CA cert:
    # ssl_client_certificate /etc/nginx/ssl/cloudflare-authenticated-origin-pull-ca.pem;
    # ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    access_log /var/log/nginx/sentry-access.log sentry_json buffer=32k flush=5s;
    error_log  /var/log/nginx/sentry-error.log warn;

    limit_conn sentry_conn 100;

    client_max_body_size 100m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # SDK event ingestion
    location ~ ^/api/\d+/store/ {
        limit_req zone=sentry_store burst=200 nodelay;
        proxy_pass http://sentry;
    }

    location ~ ^/api/\d+/envelope/ {
        limit_req zone=sentry_store burst=200 nodelay;
        proxy_pass http://sentry;
    }

    location ~ ^/api/\d+/security/ {
        limit_req zone=sentry_store burst=200 nodelay;
        proxy_pass http://sentry;
    }

    location ~ ^/api/\d+/minidump/ {
        limit_req zone=sentry_store burst=50 nodelay;
        client_max_body_size 200m;
        proxy_pass http://sentry;
    }

    location ~ ^/api/\d+/unreal/ {
        limit_req zone=sentry_store burst=50 nodelay;
        client_max_body_size 200m;
        proxy_pass http://sentry;
    }

    # Auth (strict rate limit)
    location ~ ^/auth/ {
        limit_req zone=sentry_auth burst=10 nodelay;
        proxy_pass http://sentry;
    }

    location ~ ^/api/0/auth/ {
        limit_req zone=sentry_auth burst=10 nodelay;
        proxy_pass http://sentry;
    }

    # API
    location /api/ {
        limit_req zone=sentry_api burst=100 nodelay;
        proxy_pass http://sentry;
    }

    # Everything else (with WebSocket support)
    location / {
        proxy_pass http://sentry;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /healthz {
        proxy_pass http://sentry/_health/;
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
