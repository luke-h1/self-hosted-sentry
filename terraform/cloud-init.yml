#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - htop
  - iotop
  - unattended-upgrades
  - fail2ban
  - ufw
  - git
  - jq
  - chrony

write_files:
  - path: /etc/sentry/domain
    content: ${domain}
    permissions: '0644'
  - path: /etc/sentry/admin_email
    content: ${sentry_admin_email}
    permissions: '0600'
  - path: /etc/sentry/cloudflare-tunnel-token
    content: ${cloudflare_tunnel_token}
    permissions: '0600'

  - path: /etc/ssh/sshd_config.d/99-hardened.conf
    permissions: '0600'
    content: |
      Port ${ssh_port}
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      X11Forwarding no
      MaxAuthTries 3
      MaxSessions 5
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowAgentForwarding no
      AllowTcpForwarding no
      LoginGraceTime 30

  - path: /etc/sysctl.d/99-sentry.conf
    permissions: '0644'
    content: |
      vm.max_map_count = 262144
      vm.swappiness = 10
      vm.overcommit_memory = 1
      net.core.somaxconn = 4096
      net.ipv4.tcp_max_syn_backlog = 4096
      net.ipv4.tcp_tw_reuse = 1
      net.ipv4.ip_local_port_range = 1024 65535
      net.ipv4.tcp_keepalive_time = 600
      net.ipv4.tcp_keepalive_intvl = 60
      net.ipv4.tcp_keepalive_probes = 3
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv6.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      fs.file-max = 1048576
      fs.inotify.max_user_watches = 524288

  - path: /etc/security/limits.d/99-sentry.conf
    permissions: '0644'
    content: |
      *    soft    nofile    1048576
      *    hard    nofile    1048576
      root soft    nofile    1048576
      root hard    nofile    1048576
      *    soft    nproc     65535
      *    hard    nproc     65535

  - path: /etc/fail2ban/jail.d/sshd.conf
    permissions: '0644'
    content: |
      [sshd]
      enabled  = true
      port     = ${ssh_port}
      maxretry = 3
      bantime  = 3600
      findtime = 600

  - path: /etc/systemd/system/cloudflared.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Cloudflare Tunnel
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=notify
      TimeoutStartSec=0
      ExecStart=/usr/bin/cloudflared tunnel --loglevel info --logfile /var/log/cloudflared/cloudflared.log --metrics 127.0.0.1:20241 run --token-file /etc/sentry/cloudflare-tunnel-token
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -s - --write-kubeconfig-mode 644
  - export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

  - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  - helm repo add sentry https://sentry-kubernetes.github.io/charts
  - helm repo update

  - useradd -m -s /bin/bash sentry
  - passwd -l sentry

  - mkdir -p /opt/sentry/deploy
  - mkdir -p /var/log/cloudflared

  - mkdir -p --mode=0755 /usr/share/keyrings
  - curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
  - echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main' > /etc/apt/sources.list.d/cloudflared.list
  - apt-get update
  - apt-get install -y cloudflared

  - sysctl --system

  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ${ssh_port}/tcp
  - ufw --force enable

  - systemctl enable chrony
  - systemctl start chrony

  - systemctl enable fail2ban
  - systemctl restart fail2ban

  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  - systemctl daemon-reload
  - systemctl enable cloudflared
  - systemctl restart cloudflared

  - systemctl restart sshd

  - fallocate -l 16G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

  - |
    cat > /opt/sentry/s3-credentials.env << 'EOF'
    SENTRY_FILESTORE_BACKEND=s3
    SENTRY_S3_BUCKET=${r2_bucket_name}
    SENTRY_S3_REGION=auto
    SENTRY_S3_ENDPOINT=https://${r2_account_id}.r2.cloudflarestorage.com
    SENTRY_S3_ACCESS_KEY_ID=${r2_access_key_id}
    SENTRY_S3_SECRET_ACCESS_KEY=${r2_secret_access_key}
    EOF
    chmod 600 /opt/sentry/s3-credentials.env

  - touch /opt/sentry/.cloud-init-complete
